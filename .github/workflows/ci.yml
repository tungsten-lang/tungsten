name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: rake (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            runner: macos-15
          - name: Linux x86_64
            runner: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux toolchain
        if: runner.os == 'Linux'
        run: >-
          sudo apt-get update &&
          sudo apt-get install -y
          clang llvm lld pkg-config libonig-dev libzstd-dev

      - name: Install macOS runtime dependencies
        if: runner.os == 'macOS'
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: |
          brew install llvm oniguruma zstd
          echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0.5"
          bundler-cache: true

      - name: Install reference-interpreter gems
        working-directory: implementations/ruby
        run: bundle install

      # Keep the CI entry point identical to local development. Rake builds the
      # self-hosted compiler, verifies stage-1/stage-2 identity, then runs every
      # default non-hardware suite from the repository root.
      - name: rake
        working-directory: .
        run: bundle exec rake
